<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出門清單</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      padding: 20px;
      max-width: 480px;
      margin: auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .item {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
    }

    .done {
      text-decoration: line-through;
      color: #999;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ff3b30;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>出門清單</h1>

  <div id="list"></div>

  <button onclick="resetList()">全部取消勾選</button>

  <script>
    const items = [
      "衣服",
      "褲子",
      "內衣",
      "襪子 x3",
      "化妝品"
    ];

    let checkedItems = JSON.parse(localStorage.getItem("checkedItems")) || {};

    function save() {
      localStorage.setItem("checkedItems", JSON.stringify(checkedItems));
    }

    function renderList() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      items.forEach((item) => {
        const row = document.createElement("label");
        row.className = "item";

        const checked = checkedItems[item] || false;

        row.innerHTML = `
          <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleItem('${item}')" />
          <span class="${checked ? "done" : ""}">${item}</span>
        `;

        list.appendChild(row);
      });
    }

    function toggleItem(item) {
      checkedItems[item] = !checkedItems[item];
      save();
      renderList();
    }

    function resetList() {
      checkedItems = {};
      save();
      renderList();
    }

    renderList();
  </script>
</body>
</html>
