<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Checklist</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      padding: 20px;
      max-width: 480px;
      margin: auto;
    }
    h1 {
      font-size: 28px;
    }
    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #007aff;
      color: white;
      font-size: 16px;
    }
    .item {
      background: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .item label {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .done {
      text-decoration: line-through;
      color: #999;
    }
    .delete {
      background: #ff3b30;
      padding: 8px 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>My Checklist</h1>

  <div class="input-area">
    <input id="taskInput" placeholder="新增項目..." />
    <button onclick="addTask()">新增</button>
  </div>

  <div id="list"></div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTasks() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        const item = document.createElement("div");
        item.className = "item";

        item.innerHTML = `
          <label>
            <input type="checkbox" ${task.done ? "checked" : ""} onchange="toggleTask(${index})" />
            <span class="${task.done ? "done" : ""}">${task.text}</span>
          </label>
          <button class="delete" onclick="deleteTask(${index})">刪除</button>
        `;

        list.appendChild(item);
      });
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value.trim();

      if (!text) return;

      tasks.push({ text, done: false });
      input.value = "";
      saveTasks();
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      saveTasks();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    renderTasks();
  </script>
</body>
</html>
